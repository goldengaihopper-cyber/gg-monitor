name: Deploy monitoring site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys
        run: |
          python3 -c "
          import os
          monitor_key = os.environ['MONITOR_API_KEY']
          main_key = os.environ['MAIN_API_KEY']
          path = 'docs/index.html'
          content = open(path).read()
          content = content.replace(\"const API_KEY = window.MONITOR_API_KEY || '';\", f\"const API_KEY = '{monitor_key}';\")
          content = content.replace(\"const API_KEY_1  = window.MAIN_API_KEY || '';\", f\"const API_KEY_1  = '{main_key}';\")
          open(path, 'w').write(content)
          print('Keys injected.')
          "
        env:
          MONITOR_API_KEY: ${{ secrets.MONITOR_API_KEY }}
          MAIN_API_KEY: ${{ secrets.MAIN_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
